  <title>Klayton Dias | Back-End Developer · Desenvolvedor Back-End</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="icon" type="image/x-icon" href="assets/ico/favicon.ico" />
  <link href="assets/css/style.css" rel="stylesheet" />
  <script>
    (function () {
      if (localStorage.getItem('portfolioDarkMode') === 'true') {
        document.documentElement.setAttribute('data-dark', 'true');
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>

  <!-- Botão de alternar modo escuro/claro -->
  <button class="dark-toggle-btn" id="darkToggleBtn" title="Alternar modo escuro/claro">🌙</button>

  <!-- Botão de alternar idioma -->
  <button class="lang-toggle-btn" id="langToggleBtn" title="Switch language">EN</button>

  <!-- Contador de visitas -->
  <div class="visit-counter" id="visitCounter">
    <span class="visit-counter-icon">👁</span>
    <span id="gcCount">...</span>
  </div>

  <!-- GoatCounter: analytics no dashboard -->
  <script data-goatcounter="https://tonchyods.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <!-- Contador próprio: sessão + sem bloqueio de ad blocker -->
  <script>
    (function () {
      var API = 'https://api.ton-chyod-s.me';

      function updateCount(count) {
        document.getElementById('gcCount').textContent = count;
      }

      var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

      if (!isLocal && !sessionStorage.getItem('pf_visited')) {
        fetch(API + '/api/visit', { method: 'POST' })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            sessionStorage.setItem('pf_visited', '1');
            updateCount(d.count);
          })
          .catch(function () { updateCount('–'); });
      } else {
        fetch(API + '/api/count')
          .then(function (r) { return r.json(); })
          .then(function (d) { updateCount(d.count); })
          .catch(function () { updateCount('–'); });
      }
    })();
  </script>

  <script>
    var portfolioLang = (function () {
      var saved = localStorage.getItem('portfolioLang');
      if (saved) return saved;
      var browser = (navigator.language || navigator.userLanguage || 'pt').toLowerCase();
      var lang = browser.startsWith('pt') ? 'pt' : 'en';
      localStorage.setItem('portfolioLang', lang);
      return lang;
    }());

    window.$docsify = {
      name: portfolioLang === 'en' ? 'Portfolio' : 'Portfólio',
      repo: 'https://github.com/Ton-Chyod-s/portfolio-tech',
      loadSidebar: portfolioLang === 'en' ? '_sidebar_en.md' : '_sidebar.md',
      homepage: portfolioLang === 'en' ? 'docs/en/home.md' : 'README.md',
      subMaxLevel: 2,
      themeColor: '#42b983',
      alias: {
        '/docs/.*/_sidebar.md': '/_sidebar.md',
        '/docs/_sidebar.md': '/_sidebar.md',
        '/docs/en/.*/_sidebar.md': '/_sidebar_en.md',
        '/docs/en/_sidebar.md': '/_sidebar_en.md'
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <script>
    // Dark mode
    (function () {
      var btn = document.getElementById('darkToggleBtn');
      var isDark = localStorage.getItem('portfolioDarkMode') === 'true';

      function applyDarkMode(dark) {
        isDark = dark;
        document.body.classList.toggle('dark-mode', dark);
        document.documentElement.setAttribute('data-dark', dark ? 'true' : 'false');
        btn.textContent = dark ? '☀️' : '🌙';
        btn.title = dark ? 'Mudar para modo claro' : 'Mudar para modo escuro';
        localStorage.setItem('portfolioDarkMode', dark);
      }

      document.addEventListener('DOMContentLoaded', function () {
        applyDarkMode(isDark);
        btn.addEventListener('click', function () {
          applyDarkMode(!isDark);
        });
      });
    })();

    // Language switch
    (function () {
      var langBtn = document.getElementById('langToggleBtn');

      var pageMapToEn = {
        '': '',
        'docs/sobre': 'docs/en/about',
        'docs/experiencias': 'docs/en/experiences',
        'docs/tecnologias': 'docs/en/technologies',
        'docs/projetos': 'docs/en/projects',
        'docs/contato': 'docs/en/contact',
        'docs/ajuda': 'docs/en/help'
      };
      var pageMapToPt = {
        '': '',
        'docs/en/home': '',
        'docs/en/about': 'docs/sobre',
        'docs/en/experiences': 'docs/experiencias',
        'docs/en/technologies': 'docs/tecnologias',
        'docs/en/projects': 'docs/projetos',
        'docs/en/contact': 'docs/contato',
        'docs/en/help': 'docs/ajuda'
      };

      function updateLangBtn() {
        langBtn.textContent = portfolioLang === 'pt' ? 'EN' : 'PT';
        langBtn.title = portfolioLang === 'pt' ? 'Switch to English' : 'Mudar para Português';
      }

      document.addEventListener('DOMContentLoaded', function () {
        updateLangBtn();
        langBtn.addEventListener('click', function () {
          var newLang = portfolioLang === 'pt' ? 'en' : 'pt';
          localStorage.setItem('portfolioLang', newLang);

          var hash = window.location.hash.replace(/^#\//, '').replace(/\/$/, '').replace(/\.md$/, '');
          var map = newLang === 'en' ? pageMapToEn : pageMapToPt;
          var targetPage = (hash in map) ? map[hash] : (newLang === 'en' ? 'docs/en/about' : 'docs/sobre');

          window.location.hash = '/' + targetPage;
          window.location.reload();
        });
      });
    })();
  </script>
</body>
</html>
